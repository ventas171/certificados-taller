<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga de Certificados - Geospace Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="background-animation"></div>
    
    <header>
        <div class="header-container">
            <img src="assets/logo.png" alt="Geospace Solutions Logo" class="logo" id="header-logo">
            <h1>Portal de Certificados</h1>
        </div>
    </header>

    <main>
        <section class="hero">
            <h2>Taller SNGR AG</h2>
            <p>Ingrese su número de cédula para generar y descargar su certificado de asistencia.</p>
        </section>

        <section class="search-section">
            <div class="glass-card">
                <form id="search-form">
                    <div class="input-group">
                        <label for="cedula-input">Número de Cédula</label>
                        <input type="text" id="cedula-input" placeholder="Ej. 1712345678" pattern="\d{9,10}" required>
                    </div>
                    <button type="submit" id="search-btn">
                        <span class="btn-text">Buscar Certificado</span>
                        <div class="spinner hidden" id="search-spinner"></div>
                    </button>
                </form>

                <div id="result-area" class="hidden">
                    <div class="success-message" id="success-state">
                        <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        <h3>Certificado Encontrado</h3>
                        <p class="attendee-name" id="display-name">Nombre del Asistente</p>
                        <button id="download-btn" class="primary-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Descargar Certificado
                        </button>
                    </div>
                    
                    <div class="error-message hidden" id="error-state">
                        <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        <p id="error-text">No se encontró un certificado para este número de cédula.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Geospace Solutions. Todos los derechos reservados.</p>
    </footer>

    <script src="assets/certificado_base.js"></script>
    <script src="data/attendees.js"></script>
    <script src="app.js"></script>
</body>
</html>
